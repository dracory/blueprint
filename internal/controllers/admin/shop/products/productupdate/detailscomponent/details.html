<div id="details-app" class="details-container">
	<!-- Loading state -->
	<div v-if="loading" class="text-center py-4">
		<div class="spinner-border text-primary" role="status">
			<span class="visually-hidden">Loading...</span>
		</div>
	</div>

	<!-- Error message -->
	<div v-if="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
		{{ errorMessage }}
		<button type="button" class="btn-close" @click="errorMessage = ''"></button>
	</div>

	<!-- Success message -->
	<div v-if="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
		{{ successMessage }}
		<button type="button" class="btn-close" @click="successMessage = ''"></button>
	</div>

	<template v-if="!errorMessage">
		<div class="row g-3">
			<div class="col-md-12">
				<label class="form-label fw-bold">Product Title</label>
				<input 
					type="text" 
					class="form-control" 
					v-model="details.title"
					placeholder="Enter product title..."
					:disabled="loading"
				>
			</div>

			<div class="col-md-12">
				<label class="form-label fw-bold">Description</label>
				<!-- Vue Quill Editor -->
				<div class="quill-editor-container">
					<quill-editor
						v-model:content="details.description"
						content-type="html"
						theme="snow"
						:toolbar="[
							['bold', 'italic', 'underline', 'strike'],
							['blockquote', 'code-block'],
							[{ 'header': 1 }, { 'header': 2 }],
							[{ 'list': 'ordered' }, { 'list': 'bullet' }],
							[{ 'indent': '-1' }, { 'indent': '+1' }],
							[{ 'size': ['small', false, 'large', 'huge'] }],
							[{ 'header': [1, 2, 3, 4, 5, 6, false] }],
							[{ 'color': [] }, { 'background': [] }],
							[{ 'align': [] }],
							['link', 'image'],
							['clean']
						]"
						:disabled="loading"
						style="min-height: 200px;"
					/></quill-editor>
				</div>
			</div>

			<div class="col-md-4">
				<label class="form-label fw-bold">Price</label>
				<div class="input-group">
					<span class="input-group-text">$</span>
					<input 
						type="text" 
						class="form-control" 
						v-model="details.price"
						placeholder="0.00"
						:disabled="loading"
					>
				</div>
			</div>

			<div class="col-md-4">
				<label class="form-label fw-bold">Quantity</label>
				<input 
					type="text" 
					class="form-control" 
					v-model="details.quantity"
					placeholder="0"
					:disabled="loading"
				>
			</div>

			<div class="col-md-4">
				<label class="form-label fw-bold">Status</label>
				<select class="form-select" v-model="details.status" :disabled="loading">
					<option value="active">Active</option>
					<option value="inactive">Inactive</option>
					<option value="draft">Draft</option>
				</select>
			</div>
		</div>
	</template>
</div>
