<div id="metadata-app" class="metadata-container">
	<!-- Loading state -->
	<div v-if="loading" class="text-center py-4">
		<div class="spinner-border text-primary" role="status">
			<span class="visually-hidden">Loading...</span>
		</div>
	</div>

	<!-- Error message -->
	<div v-if="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
		{{ errorMessage }}
		<button type="button" class="btn-close" @click="errorMessage = ''"></button>
	</div>

	<!-- Success message -->
	<div v-if="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
		{{ successMessage }}
		<button type="button" class="btn-close" @click="successMessage = ''"></button>
	</div>

	<template v-if="!errorMessage">
		<!-- Metadata Table -->
		<table class="table table-hover mb-0" v-if="metadataItems.length > 0">
			<thead class="table-light">
				<tr>
					<th style="width: 30%">Key</th>
					<th style="width: 60%">Value</th>
					<th style="width: 10%" class="text-center">Action</th>
				</tr>
			</thead>
			<tbody>
				<tr v-for="(item, index) in metadataItems" :key="item.id">
					<td>
						<input 
							type="text" 
							class="form-control form-control-sm" 
							v-model="item.key"
							placeholder="Enter key..."
							:disabled="loading"
						>
					</td>
					<td>
						<input 
							type="text" 
							class="form-control form-control-sm" 
							v-model="item.value"
							placeholder="Enter value..."
							:disabled="loading"
						>
					</td>
					<td class="text-center">
						<button 
							type="button" 
							class="btn btn-sm btn-outline-danger" 
							@click="removeItem(index)"
							title="Remove"
							:disabled="loading"
						>
							<i class="bi bi-trash"></i>
						</button>
					</td>
				</tr>
			</tbody>
		</table>

		<!-- Empty State -->
		<div v-else class="p-4 text-center text-muted">
			<i class="bi bi-inbox fs-1"></i>
			<p class="mb-0">No metadata entries yet. Add one below.</p>
		</div>

		<!-- Add New Row -->
		<div class="p-3 border-top bg-light">
			<div class="row g-2 align-items-end">
				<div class="col-md-4">
					<label class="form-label small fw-bold">New Key</label>
					<input 
						type="text" 
						class="form-control" 
						v-model="newKey"
						placeholder="Enter metadata key..."
						@keyup.enter="addItem"
						:disabled="loading"
					>
				</div>
				<div class="col-md-6">
					<label class="form-label small fw-bold">New Value</label>
					<input 
						type="text" 
						class="form-control" 
						v-model="newValue"
						placeholder="Enter metadata value..."
						@keyup.enter="addItem"
						:disabled="loading"
					>
				</div>
				<div class="col-md-2">
					<button 
						type="button" 
						class="btn btn-success w-100" 
						@click="addItem"
						:disabled="!newKey.trim() || loading"
					>
						<i class="bi bi-plus-lg me-1"></i>
						Add
					</button>
				</div>
			</div>
		</div>
	</template>
</div>
