<div id="post-editor-app">
  <template v-if="mounted">
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="mb-0">AI Post Content Editor</h1>
        <a :href="backUrl" class="btn btn-secondary">&larr; Back to Post</a>
      </div>

      <div v-if="error" class="alert alert-danger">{{ error }}</div>
      <div v-if="success" class="alert alert-success">{{ success }}</div>

      <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="fw-semibold">Title &amp; Summary</span>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            <input type="text" class="form-control" v-model="title">
          </div>
          <div class="mb-0">
            <label class="form-label fw-semibold">Summary</label>
            <textarea class="form-control auto-resize-textarea" v-model="summary" rows="3" @input="autoResize($event)"></textarea>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mb-3">
        <button type="button" class="btn btn-outline-secondary" :disabled="saving" @click="save('apply')">
          <i class="bi bi-check2 me-2"></i> Apply
          <span v-if="savingApply" class="spinner-border spinner-border-sm ms-2" role="status"></span>
        </button>
        <button type="button" class="btn btn-primary" :disabled="saving" @click="save('save_close')">
          <i class="bi bi-check2-all me-2"></i> Save &amp; Close
          <span v-if="savingClose" class="spinner-border spinner-border-sm ms-2" role="status"></span>
        </button>
      </div>

      <div ref="blocksContainer" id="BlocksContainer">
        <div v-for="(block, index) in blocks" :key="block.id" class="card mb-3 block-card" :data-block-id="block.id">
          <div class="card-header d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
              <span class="block-drag-handle me-2" style="cursor:move;"><i class="bi bi-arrows-move"></i></span>
              <span class="fw-semibold">{{ blockLabel(block.type) }}</span>
            </div>
            <div class="btn-group btn-group-sm">
              <button type="button" class="btn btn-outline-info btn-sm" :disabled="regenerating === block.id" @click="regenerateBlock(block.id)">
                <i class="bi bi-stars"></i>
                <span v-if="regenerating === block.id" class="spinner-border spinner-border-sm ms-1" role="status"></span>
              </button>
              <button type="button" class="btn btn-outline-secondary btn-sm" @click="duplicateBlock(block.id)">
                <i class="bi bi-files"></i>
              </button>
              <button type="button" class="btn btn-outline-danger btn-sm" @click="deleteBlock(block.id)">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
          <div class="card-body">
            <input v-if="block.type === 'h1' || block.type === 'h2'" type="text" class="form-control" v-model="block.text">
            <textarea v-else class="form-control font-monospace auto-resize-textarea" v-model="block.text" :rows="block.type === 'code' ? 6 : 3" @input="autoResize($event)"></textarea>
          </div>
        </div>
      </div>
    </div>
  </template>
  <template v-else>
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  </template>
</div>
