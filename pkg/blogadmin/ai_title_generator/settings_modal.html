<div id="title-settings-app">
  <button type="button" class="btn btn-outline-secondary btn-sm" @click="showModal = true">
    <i class="bi bi-gear me-1"></i> Settings
  </button>

  <div v-if="showModal" class="modal fade show" tabindex="-1" style="display:block; background: rgba(0,0,0,0.5);">
    <div class="modal-dialog-wrapper d-flex align-items-center justify-content-center min-vh-100">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title mb-0">Title Generator Settings</h5>
            <button type="button" class="btn-close" @click="showModal = false"></button>
          </div>
          <div class="modal-body">
            <div v-if="infoMessage" class="alert alert-info d-flex align-items-center gap-2 mb-3" role="alert">
              <i class="bi bi-info-circle-fill"></i>
              <span>{{ infoMessage }}</span>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" for="blog_topic">Blog Topic</label>
              <textarea class="form-control" id="blog_topic" v-model="form.blogTopic" rows="8" placeholder="Set the main blog topic used to generate AI titles."></textarea>
              <small class="form-text text-muted">This blog topic guides how the AI generates suggestions. Make it specific to your niche.</small>
            </div>
          </div>
          <div class="modal-footer d-flex w-100 justify-content-between align-items-center flex-wrap gap-2">
            <button type="button" class="btn btn-outline-secondary" @click="showModal = false">
              <i class="bi bi-chevron-left me-2"></i> Close
            </button>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-primary" :disabled="saving" @click="save('apply')">
                <i class="bi bi-check2 me-2"></i> Apply
                <span v-if="savingApply" class="spinner-border spinner-border-sm ms-2" role="status"></span>
              </button>
              <button type="button" class="btn btn-success" :disabled="saving" @click="save('save_close')">
                <i class="bi bi-check2-all me-2"></i> Save &amp; Close
                <span v-if="savingClose" class="spinner-border spinner-border-sm ms-2" role="status"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
