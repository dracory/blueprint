<style>
  .advanced-tools-panel {
    transition: all 0.3s ease;
  }
</style>

<div id="post-details-app">
  <div v-if="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div v-else>
    <form id="FormPostUpdateDetails" @submit.prevent="saveDetails">
      <div class="mb-3">
        <label for="post_status" class="form-label">Status</label>
        <select 
          id="post_status" 
          name="post_status" 
          class="form-select" 
          v-model="form.status"
          required
        >
          <option value="">- not selected -</option>
          <option value="draft">Draft</option>
          <option value="published">Published</option>
          <option value="unpublished">Unpublished</option>
          <option value="trash">In Trash Bin</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="post_image_url" class="form-label">Image URL</label>
        <input 
          type="text" 
          id="post_image_url" 
          name="post_image_url" 
          class="form-control" 
          v-model="form.imageUrl"
        />
        <div v-if="form.imageUrl" class="mt-2">
          <img :src="form.imageUrl" alt="Post Image" class="img-thumbnail" style="max-height: 200px;" />
        </div>
      </div>

      <div class="mb-3">
        <label for="post_featured" class="form-label">Featured</label>
        <select 
          id="post_featured" 
          name="post_featured" 
          class="form-select" 
          v-model="form.featured"
        >
          <option value="">- not selected -</option>
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="post_published_at" class="form-label">Published At</label>
        <input 
          type="datetime-local" 
          id="post_published_at" 
          name="post_published_at" 
          class="form-control" 
          v-model="form.publishedAt"
        />
      </div>

      <div class="mb-3">
        <label for="post_editor" class="form-label">Editor</label>
        <select 
          id="post_editor" 
          name="post_editor" 
          class="form-select" 
          v-model="form.editor"
        >
          <option value="">- not selected -</option>
          <option 
            v-for="editor in editorOptions" 
            :key="editor.value" 
            :value="editor.value"
          >
            {{ editor.label }}
          </option>
        </select>
      </div>

      <div class="mb-3">
        <label for="post_memo" class="form-label">Admin Notes</label>
        <textarea 
          id="post_memo" 
          name="post_memo" 
          class="form-control" 
          v-model="form.memo"
          rows="3"
        ></textarea>
      </div>

      <input type="hidden" name="post_id" :value="postId" />

      <div class="mt-3 d-flex justify-content-between align-items-center">
        <button 
          type="button" 
          class="btn btn-link btn-sm js-toggle-advanced-tools"
          @click="toggleAdvancedTools"
        >
          <i class="bi bi-tools me-1"></i>
          Toggle Advanced Tools
        </button>

        <button 
          type="submit" 
          class="btn btn-primary"
          :disabled="saving"
        >
          <i class="bi bi-save me-1"></i>
          <span>Save</span>
          <span 
            v-if="saving" 
            class="spinner-border spinner-border-sm align-middle ms-2" 
            role="status"
          >
            <span class="visually-hidden">Loading</span>
          </span>
        </button>
      </div>

      <div class="mt-3 js-advanced-tools-panel" :class="{ 'd-none': !showAdvancedTools }">
        <div class="border rounded p-2 bg-dark bg-opacity-25">
          <div class="small text-muted mb-2">
            <i class="bi bi-tools me-1"></i>
            Advanced Tools
          </div>
          <div class="d-flex justify-content-start">
            <button 
              type="button" 
              class="btn btn-outline-warning me-2 js-regenerate-image"
              @click="confirmRegenerateImage"
              :disabled="regenerating"
            >
              <i class="bi bi-magic me-1"></i>
              <span>Regenerate Image</span>
              <span 
                v-if="regenerating" 
                class="spinner-border spinner-border-sm align-middle ms-2" 
                role="status"
              >
                <span class="visually-hidden">Loading</span>
              </span>
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
