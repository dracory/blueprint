<div id="app">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="card-title mb-0">Categories</h5>
      <button class="btn btn-primary btn-sm" @click="loadCategories">Refresh</button>
    </div>
    <div class="card-body">
      <div v-if="loading" class="text-center py-4">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      <div v-else-if="error" class="alert alert-danger">
        {{ error }}
      </div>
      <div v-else>
        <div v-if="categories.length === 0" class="text-center py-4 text-muted">
          No categories found
        </div>
        <div v-else class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>
                  <input type="checkbox" v-model="selectAll" @change="toggleSelectAll">
                </th>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th>Created At</th>
                <th>Updated At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="category in categories" :key="category.id">
                <td>
                  <input type="checkbox" v-model="selectedCategories" :value="category.id">
                </td>
                <td>{{ category.id }}</td>
                <td>{{ category.title }}</td>
                <td>{{ category.description }}</td>
                <td>
                  <span class="badge" :class="getStatusBadgeClass(category.status)">
                    {{ category.status }}
                  </span>
                </td>
                <td>{{ formatDate(category.created_at) }}</td>
                <td>{{ formatDate(category.updated_at) }}</td>
                <td>
                  <button class="btn btn-sm btn-danger" @click="deleteCategory(category.id)">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div v-if="selectedCategories.length > 0" class="mt-3">
          <button class="btn btn-danger" @click="deleteSelectedCategories">
            Delete Selected ({{ selectedCategories.length }})
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
