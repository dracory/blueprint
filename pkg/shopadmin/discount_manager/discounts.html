<div id="app">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="card-title mb-0">Discounts</h5>
      <button class="btn btn-primary btn-sm" @click="loadDiscounts">Refresh</button>
    </div>
    <div class="card-body">
      <div v-if="loading" class="text-center py-4">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      <div v-else-if="error" class="alert alert-danger">
        {{ error }}
      </div>
      <div v-else>
        <div v-if="discounts.length === 0" class="text-center py-4 text-muted">
          No discounts found
        </div>
        <div v-else class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>
                  <input type="checkbox" v-model="selectAll" @change="toggleSelectAll">
                </th>
                <th>ID</th>
                <th>Code</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Created At</th>
                <th>Updated At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="discount in discounts" :key="discount.id">
                <td>
                  <input type="checkbox" v-model="selectedDiscounts" :value="discount.id">
                </td>
                <td>{{ discount.id }}</td>
                <td>{{ discount.code }}</td>
                <td>{{ discount.amount }}</td>
                <td>
                  <span class="badge" :class="getStatusBadgeClass(discount.status)">
                    {{ discount.status }}
                  </span>
                </td>
                <td>{{ formatDate(discount.created_at) }}</td>
                <td>{{ formatDate(discount.updated_at) }}</td>
                <td>
                  <button class="btn btn-sm btn-danger" @click="deleteDiscount(discount.id)">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div v-if="selectedDiscounts.length > 0" class="mt-3">
          <button class="btn btn-danger" @click="deleteSelectedDiscounts">
            Delete Selected ({{ selectedDiscounts.length }})
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
