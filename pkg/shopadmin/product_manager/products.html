<div id="app">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5 class="card-title mb-0">Products</h5>
      <button class="btn btn-primary btn-sm" @click="loadProducts">Refresh</button>
    </div>
    <div class="card-body">
      <div v-if="loading" class="text-center py-4">
        <div class="spinner-border" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      <div v-else-if="error" class="alert alert-danger">
        {{ error }}
      </div>
      <div v-else>
        <div v-if="products.length === 0" class="text-center py-4 text-muted">
          No products found
        </div>
        <div v-else class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>
                  <input type="checkbox" v-model="selectAll" @change="toggleSelectAll">
                </th>
                <th>ID</th>
                <th>Title</th>
                <th>Status</th>
                <th>Price</th>
                <th>Created At</th>
                <th>Updated At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="product in products" :key="product.id">
                <td>
                  <input type="checkbox" v-model="selectedProducts" :value="product.id">
                </td>
                <td>{{ product.id }}</td>
                <td>{{ product.title }}</td>
                <td>
                  <span class="badge" :class="getStatusBadgeClass(product.status)">
                    {{ product.status }}
                  </span>
                </td>
                <td>${{ product.price }}</td>
                <td>{{ formatDate(product.created_at) }}</td>
                <td>{{ formatDate(product.updated_at) }}</td>
                <td>
                  <a :href="urlUpdateProduct + '&product_id=' + product.id" class="btn btn-sm btn-primary me-1">Edit</a>
                  <button class="btn btn-sm btn-danger" @click="deleteProduct(product.id)">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div v-if="selectedProducts.length > 0" class="mt-3">
          <button class="btn btn-danger" @click="deleteSelectedProducts">
            Delete Selected ({{ selectedProducts.length }})
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
