<div id="app-product-update" class="mt-3">
    <div v-if="loading" class="text-center py-4">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div v-else>
        <div v-if="errorMessage" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
        </div>

        <form @submit.prevent="save('apply')">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input v-model="form.title" type="text" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea v-model="form.description" class="form-control" rows="4"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select v-model="form.status" class="form-select">
                    <option value="">- not selected -</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Price</label>
                <input v-model="form.price" type="number" step="0.01" class="form-control" required>
            </div>

            <div class="mt-4 d-flex justify-content-between align-items-center flex-wrap gap-2">
                <a :href="returnUrl" class="btn btn-secondary">
                    <i class="bi bi-chevron-left me-2"></i>Back
                </a>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-primary" @click="save('apply')" :disabled="saving">
                        <span v-if="saving && action === 'apply'" class="spinner-border spinner-border-sm me-1"></span>
                        <i v-else class="bi bi-check2 me-2"></i>Apply
                    </button>
                    <button type="button" class="btn btn-success" @click="save('save')" :disabled="saving">
                        <span v-if="saving && action === 'save'" class="spinner-border spinner-border-sm me-1"></span>
                        <i v-else class="bi bi-check2-all me-2"></i>Save & Close
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
