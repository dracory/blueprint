<div id="metadata-app">
    <div v-if="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div v-else>
        <!-- Success Message -->
        <div v-if="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
            {{ successMessage }}
            <button type="button" class="btn-close" @click="successMessage = ''"></button>
        </div>

        <!-- Error Message -->
        <div v-if="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ errorMessage }}
            <button type="button" class="btn-close" @click="errorMessage = ''"></button>
        </div>

        <!-- Product Metadata Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">
                <i class="bi bi-list-ul me-2"></i>
                <span>Product Metadata</span>
            </h5>
            <div class="d-flex gap-2">
                <button
                    type="button"
                    class="btn btn-primary"
                    @click="showModal = true"
                    :disabled="loading"
                >
                    <i class="bi bi-plus-circle me-2"></i> Add
                </button>
                <button
                    v-if="hasChanges"
                    type="button"
                    class="btn btn-success"
                    @click="saveMetadata"
                    :disabled="loading"
                >
                    <span v-if="loading" class="spinner-border spinner-border-sm me-2"></span>
                    <i v-else class="bi bi-save me-2"></i>
                    Save Metadata
                </button>
            </div>
        </div>

        <!-- Metadata List -->
        <div v-if="metadataItems.length > 0" class="mb-4">
            <div class="metadata-list">
                <div v-for="(item, index) in metadataItems" :key="item.id" class="metadata-item mb-3">
                    <div class="card border-0 shadow-sm" :class="index % 2 === 0 ? 'bg-light' : 'bg-white'">
                        <div class="card-body p-3">
                            <div class="row align-items-center g-3">
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Key</label>
                                    <input
                                        type="text"
                                        class="form-control form-control-sm"
                                        v-model="item.key"
                                        placeholder="Enter metadata key..."
                                    >
                                </div>
                                <div class="col-md-7">
                                    <label class="form-label fw-bold">Value</label>
                                    <textarea
                                        class="form-control form-control-sm"
                                        v-model="item.value"
                                        placeholder="Enter metadata value..."
                                        rows="2"
                                    ></textarea>
                                </div>
                                <div class="col-md-1">
                                    <button
                                        type="button"
                                        class="btn btn-sm btn-outline-danger w-100"
                                        @click="removeItem(index)"
                                        title="Remove metadata"
                                    >
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center p-3 border-top">
                <span class="text-muted">{{ metadataItems.length }} total</span>
                <div class="d-flex gap-2">
                    <button
                        type="button"
                        class="btn btn-primary"
                        @click="showModal = true"
                        :disabled="loading"
                    >
                        <i class="bi bi-plus-circle me-2"></i> Add
                    </button>
                    <button
                        v-if="hasChanges"
                        type="button"
                        class="btn btn-success"
                        @click="saveMetadata"
                        :disabled="loading"
                    >
                        <span v-if="loading" class="spinner-border spinner-border-sm me-2"></span>
                        <i v-else class="bi bi-save me-2"></i>
                        Save Metadata
                    </button>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div v-else class="alert alert-info mb-4">
            <i class="bi bi-info-circle me-2"></i>
            <span>No metadata yet. Add some below.</span>
        </div>

        <!-- Add Metadata Modal -->
        <div v-if="showModal" class="modal fade show d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.5);">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Add Metadata</h5>
                        <button type="button" class="btn-close" @click="showModal = false"></button>
                    </div>
                    <div class="modal-body">
                        <label class="form-label fw-bold">Key</label>
                        <input
                            type="text"
                            class="form-control mb-3"
                            v-model="newKey"
                            placeholder="Enter metadata key..."
                            @keypress.enter.prevent="addItem"
                            :disabled="loading"
                        >
                        <label class="form-label fw-bold">Value</label>
                        <textarea
                            class="form-control"
                            v-model="newValue"
                            placeholder="Enter metadata value..."
                            rows="3"
                            @keypress.enter.prevent="addItem"
                            :disabled="loading"
                        ></textarea>
                    </div>
                    <div class="modal-footer d-flex justify-content-between">
                        <button type="button" class="btn btn-secondary" @click="showModal = false">
                            <i class="bi bi-chevron-left me-2"></i> Cancel
                        </button>
                        <button
                            type="button"
                            class="btn btn-primary"
                            @click="addItem"
                            :disabled="!newKey.trim() || loading"
                        >
                            <i class="bi bi-plus-circle me-2"></i> Add
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
