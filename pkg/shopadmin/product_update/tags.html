<div id="tags-app">
    <div v-if="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div v-else>
        <!-- Success Message -->
        <div v-if="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
            {{ successMessage }}
            <button type="button" class="btn-close" @click="successMessage = ''"></button>
        </div>

        <!-- Error Message -->
        <div v-if="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ errorMessage }}
            <button type="button" class="btn-close" @click="errorMessage = ''"></button>
        </div>

        <!-- Product Tags Header -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">
                <i class="bi bi-tags me-2"></i>
                <span>Product Tags</span>
            </h5>
            <div class="d-flex gap-2">
                <button
                    type="button"
                    class="btn btn-primary"
                    @click="showModal = true"
                    :disabled="loading"
                >
                    <i class="bi bi-plus-circle me-2"></i> Add
                </button>
                <button
                    v-if="hasChanges"
                    type="button"
                    class="btn btn-success"
                    @click="saveTags"
                    :disabled="loading"
                >
                    <span v-if="loading" class="spinner-border spinner-border-sm me-2"></span>
                    <i v-else class="bi bi-save me-2"></i>
                    Save Tags
                </button>
            </div>
        </div>

        <!-- Current Tags -->
        <div v-if="tags.length > 0" class="mb-4">
            <h6 class="text-muted mb-3">Current Tags</h6>
            <div class="d-flex flex-wrap gap-2">
                <span v-for="(tag, index) in tags" :key="tag" class="badge bg-primary d-flex align-items-center gap-1">
                    <span>{{ tag }}</span>
                    <button type="button" class="btn btn-sm btn-link text-white p-0" style="font-size: 0.75em;" @click="removeTag(index)">
                        <i class="bi bi-x"></i>
                    </button>
                </span>
            </div>
        </div>

        <!-- Empty State -->
        <div v-else class="alert alert-info mb-4">
            <i class="bi bi-info-circle me-2"></i>
            <span>No tags yet. Add some below.</span>
        </div>

        <!-- Add Tags Modal -->
        <div v-if="showModal" class="modal fade show d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.5);">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Add Tags</h5>
                        <button type="button" class="btn-close" @click="showModal = false"></button>
                    </div>
                    <div class="modal-body">
                        <label class="form-label fw-bold">Quick Add</label>
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <button
                                type="button"
                                class="btn btn-sm btn-outline-primary"
                                @click="addQuickTag('featured')"
                                :disabled="loading"
                            >featured</button>
                            <button
                                type="button"
                                class="btn btn-sm btn-outline-success"
                                @click="addQuickTag('new')"
                                :disabled="loading"
                            >new</button>
                            <button
                                type="button"
                                class="btn btn-sm btn-outline-info"
                                @click="addQuickTag('sale')"
                                :disabled="loading"
                            >sale</button>
                            <button
                                type="button"
                                class="btn btn-sm btn-outline-warning"
                                @click="addQuickTag('popular')"
                                :disabled="loading"
                            >popular</button>
                        </div>
                        <label class="form-label fw-bold">Custom Tag</label>
                        <input
                            type="text"
                            class="form-control"
                            v-model="modalTagInput"
                            placeholder="Enter a tag name..."
                            @keypress.enter.prevent="addModalTag"
                            :disabled="loading"
                        >
                    </div>
                    <div class="modal-footer d-flex justify-content-between">
                        <button type="button" class="btn btn-secondary" @click="showModal = false">
                            <i class="bi bi-chevron-left me-2"></i> Cancel
                        </button>
                        <button
                            type="button"
                            class="btn btn-primary"
                            @click="addModalTag"
                            :disabled="loading || !modalTagInput.trim()"
                        >
                            <i class="bi bi-plus-circle me-2"></i> Add
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
