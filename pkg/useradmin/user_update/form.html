<div id="app-user-update" class="mt-3">
    <div v-if="loading" class="text-center py-4">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div v-else>
        <div v-if="errorMessage" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
        </div>

        <div v-if="warningFields.length > 0" class="alert alert-warning">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            The following field tokens could not be decrypted: {{ warningFields.join(', ') }}.
            This may be due to a vault key mismatch. These fields show encrypted data and are disabled until the tokens can be read.
        </div>

        <div v-if="successMessage" class="alert alert-success">
            <i class="bi bi-check-circle-fill me-2"></i>{{ successMessage }}
        </div>

        <form @submit.prevent="save('apply')">
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select v-model="form.status" class="form-select" :disabled="hasUnreadableFields">
                    <option value="">- not selected -</option>
                    <option value="active">Active</option>
                    <option value="unverified">Unverified</option>
                    <option value="inactive">Inactive</option>
                    <option value="deleted">In Trash Bin</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input v-model="form.first_name" type="text" class="form-control" :disabled="!fieldStatus.first_name">
            </div>

            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input v-model="form.last_name" type="text" class="form-control" :disabled="!fieldStatus.last_name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input v-model="form.email" type="email" class="form-control" :disabled="!fieldStatus.email">
            </div>

            <div class="mb-3">
                <label class="form-label">Business Name</label>
                <input v-model="form.business_name" type="text" class="form-control" :disabled="!fieldStatus.business_name">
            </div>

            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input v-model="form.phone" type="text" class="form-control" :disabled="!fieldStatus.phone">
            </div>

            <div class="mb-3">
                <label class="form-label">Country</label>
                <select v-model="form.country" class="form-select" @change="onCountryChange" :disabled="hasUnreadableFields">
                    <option value="">Select country</option>
                    <option v-for="c in countries" :key="c.iso_code_2" :value="c.iso_code_2">{{ c.name }}</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Timezone</label>
                <select v-model="form.timezone" class="form-select" :disabled="hasUnreadableFields || timezones.length === 0">
                    <option value="">Select timezone</option>
                    <option v-for="tz in timezones" :key="tz.timezone" :value="tz.timezone">{{ tz.timezone }}</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Admin Notes</label>
                <textarea v-model="form.memo" class="form-control" rows="4" :disabled="hasUnreadableFields"></textarea>
            </div>

            <div class="mt-4 d-flex justify-content-between align-items-center flex-wrap gap-2">
                <a :href="returnUrl" class="btn btn-secondary">
                    <i class="bi bi-chevron-left me-2"></i>Back
                </a>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-primary" @click="save('apply')" :disabled="hasUnreadableFields || saving">
                        <span v-if="saving && action === 'apply'" class="spinner-border spinner-border-sm me-1"></span>
                        <i v-else class="bi bi-check2 me-2"></i>Apply
                    </button>
                    <button type="button" class="btn btn-success" @click="save('save')" :disabled="hasUnreadableFields || saving">
                        <span v-if="saving && action === 'save'" class="spinner-border spinner-border-sm me-1"></span>
                        <i v-else class="bi bi-check2-all me-2"></i>Save & Close
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
